  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      color: #ede8df;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

      max-width: 560px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;

      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.5px;
    }

      font-style: italic;
      color: #c8a96a;
    }

      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);

      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 420px;
    }

      font-size: clamp(16px, 2.5vw, 19px);
      color: #a09a92;
      font-weight: 300;
      line-height: 1.6;
      max-width: 44ch;

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 44px;
      background: #c8a96a;
      color: #080808;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      width: 100%;
    }
    .btn:hover {
      background: #e8c98a;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(200,169,106,0.25);
    }

    footer {
      margin-top: 32px;
      font-size: 11px;
      color: #3a3530;
      text-align: center;
